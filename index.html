<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Security: CSP -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
    <title>EcoTrack | Carbon Footprint Awareness</title>
    <meta name="description" content="Track and reduce your carbon footprint with EcoTrack. Secure, accessible, and premium footprint tracker." />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>EcoTrack</h1>
        <p>Your journey to a sustainable future starts here.</p>
      </header>
      <main>
        <section id="calculator" aria-labelledby="calc-title">
          <h2 id="calc-title" class="sr-only">Footprint Calculator</h2>
          <div class="glass-card">
            <form id="footprint-form" aria-label="Carbon footprint estimation form">
              <div class="form-group">
                <label for="transportType">Transport Method</label>
                <select id="transportType" required aria-required="true">
                  <option value="car">Car (Fuel)</option>
                  <option value="bus">Public Bus</option>
                  <option value="train">Train / Metro</option>
                  <option value="flight">Air Travel</option>
                </select>
              </div>

              <div class="form-group">
                <label for="transportDistance">Weekly Distance (km)</label>
                <div class="input-with-button">
                  <input type="number" id="transportDistance" min="0" value="50" required aria-required="true">
                  <button type="button" id="estimate-distance-btn" class="secondary-btn">Estimate via Google Maps</button>
                </div>
              </div>

              <div class="form-group">
                <label for="energyType">Home Energy Source</label>
                <select id="energyType" required aria-required="true">
                  <option value="electricity">Electricity (Grid)</option>
                  <option value="gas">Natural Gas</option>
                </select>
              </div>

              <div class="form-group">
                <label for="energyUsage">Weekly Usage (kWh)</label>
                <input type="number" id="energyUsage" min="0" value="100" required aria-required="true">
              </div>

              <div class="form-group">
                <label for="dietType">Dietary Style</label>
                <select id="dietType" required aria-required="true">
                  <option value="meat">Omnivore / Meat</option>
                  <option value="vegetarian">Vegetarian</option>
                  <option value="vegan">Vegan</option>
                </select>
              </div>

              <button type="submit" id="calculate-btn">Calculate Footprint</button>
            </form>

            <div id="results" class="result-section" aria-live="polite">
              <h3>Your Annual Impact</h3>
              <span id="total-score">0.00</span>
              <p>kg CO2 / year</p>
              <div id="insights" class="insights-container"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
